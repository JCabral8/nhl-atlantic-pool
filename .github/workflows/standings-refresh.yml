name: Refresh Atlantic standings snapshot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check current ET hour
        id: et_gate
        run: |
          ET_HOUR="$(TZ=America/New_York date +%H)"
          echo "et_hour=${ET_HOUR}" >> "$GITHUB_OUTPUT"
          if [ "$ET_HOUR" = "08" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop outside 8 AM ET
        if: ${{ github.event_name == 'schedule' && steps.et_gate.outputs.should_run != 'true' }}
        run: |
          echo "Skipping scheduled run because it is not 08:00 ET."
          exit 0

      - name: Checkout repo
        if: ${{ github.event_name == 'workflow_dispatch' || steps.et_gate.outputs.should_run == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ github.event_name == 'workflow_dispatch' || steps.et_gate.outputs.should_run == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update snapshot file
        if: ${{ github.event_name == 'workflow_dispatch' || steps.et_gate.outputs.should_run == 'true' }}
        run: node scripts/update-standings-snapshot.mjs

      - name: Commit and push if changed
        if: ${{ github.event_name == 'workflow_dispatch' || steps.et_gate.outputs.should_run == 'true' }}
        run: |
          if git diff --quiet -- public/standings.snapshot.json; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/standings.snapshot.json
          git commit -m "chore: refresh Atlantic standings snapshot (8am ET)"
          git push
